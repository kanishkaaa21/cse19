<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to flex</title>
    <style>
        *{
             margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(6,1fr);
            grid-template-rows: repeat(6,1fr);
            gap: 10px;

        }
        .item1{
            background-color: aquamarine;
            border: 1px solid;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">Header</div>
        <div class="item item2">Side menu</div>
        <div class="item item3">main menu</div>
        <div class="item item4">content1</div>
        <div class="item item5">content2</div>
        <div class="item item6">footer</div>
    </div>
</body>
</html>
